<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0818" />
  <title>Твой Дизайн</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ЭКРАН 1: Приветствие -->
  <div id="screen-welcome" class="active">
    <div class="hero-content">
      <button class="btn-gold" onclick="showScreen('screen-form')">Начать расчёт</button>
    </div>
  </div>

  <!-- ЭКРАН 2: Форма -->
  <div id="screen-form">
    <div class="form-wrap">
      <h2>Данные рождения</h2>
      <p class="form-hint">Чем точнее время — тем точнее расчёт</p>

      <div class="field">
        <label>Имя</label>
        <input type="text" id="input-name" placeholder="Как тебя зовут?" />
      </div>

      <!-- Дата — барабан -->
      <div class="field">
        <label>Дата рождения</label>
        <div class="picker-trigger" onclick="openPicker('date')">
          <span id="date-display">Выбрать дату</span>
          <span class="picker-arrow">▾</span>
        </div>
      </div>

      <!-- Время — барабан -->
      <div class="field">
        <label>Время рождения</label>
        <div class="picker-trigger" onclick="openPicker('time')">
          <span id="time-display">Выбрать время</span>
          <span class="picker-arrow">▾</span>
        </div>
        <span class="field-note">Если не знаешь — выбери 12:00</span>
      </div>

      <div class="field">
        <label>Город рождения</label>
        <input type="text" id="input-city" placeholder="Например: Москва" />
      </div>

      <button onclick="calculate()">Рассчитать →</button>
      <button class="btn-back" onclick="showScreen('screen-welcome')">Назад</button>
    </div>
  </div>

  <!-- ЭКРАН 3: Результат -->
  <div id="screen-result">
    <h2>Твой результат</h2>
    <p>Здесь будет бодиграф</p>
    <button class="btn-back" onclick="showScreen('screen-form')">Назад</button>
  </div>

  <!-- БАРАБАН: Дата -->
  <div id="picker-date" class="picker-overlay" onclick="closePicker('date')">
    <div class="picker-sheet" onclick="event.stopPropagation()">
      <div class="picker-header">
        <button class="btn-back" onclick="closePicker('date')">Отмена</button>
        <span class="picker-title">Дата рождения</span>
        <button class="picker-done" onclick="confirmDate()">Готово</button>
      </div>
      <div class="picker-body">
        <div class="picker-col" id="col-day"></div>
        <div class="picker-col" id="col-month"></div>
        <div class="picker-col" id="col-year"></div>
        <div class="picker-highlight"></div>
      </div>
    </div>
  </div>

  <!-- БАРАБАН: Время -->
  <div id="picker-time" class="picker-overlay" onclick="closePicker('time')">
    <div class="picker-sheet" onclick="event.stopPropagation()">
      <div class="picker-header">
        <button class="btn-back" onclick="closePicker('time')">Отмена</button>
        <span class="picker-title">Время рождения</span>
        <button class="picker-done" onclick="confirmTime()">Готово</button>
      </div>
      <div class="picker-body">
        <div class="picker-col" id="col-hour"></div>
        <div class="picker-col" id="col-minute"></div>
        <div class="picker-highlight"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/picker.js"></script>
</body>
</html>
