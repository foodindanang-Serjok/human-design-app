<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0818" />
  <title>Твой Дизайн</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ЭКРАН 1: Приветствие -->
  <div id="screen-welcome" class="active">
    <div class="hero-content">
      <button class="btn-gold" onclick="showScreen('screen-form')">Начать расчёт</button>
    </div>
  </div>

  <!-- ЭКРАН 2: Форма -->
  <div id="screen-form">
    <div class="form-wrap">
      <h2>Данные рождения</h2>
      <p class="form-hint">Чем точнее время — тем точнее расчёт</p>

      <div class="field">
        <label>Имя</label>
        <input type="text" id="input-name" placeholder="Как тебя зовут?" />
      </div>

      <div class="field">
        <label>Дата рождения</label>
        <div class="picker-trigger" onclick="openPicker('date')">
          <span id="date-display">Выбрать дату</span>
          <span class="picker-arrow">▾</span>
        </div>
      </div>

      <div class="field">
        <label>Время рождения</label>
        <div class="picker-trigger" onclick="openPicker('time')">
          <span id="time-display">Выбрать время</span>
          <span class="picker-arrow">▾</span>
        </div>
        <span class="field-note">Если не знаешь — выбери 12:00</span>
      </div>

      <div class="field">
        <label>Город рождения</label>
        <div class="city-wrapper">
          <input type="text" id="input-city" placeholder="Например: Москва" autocomplete="off" />
          <div id="cities-list"></div>
        </div>
      </div>

      <button onclick="calculate()">Рассчитать →</button>
      <button class="btn-back" onclick="showScreen('screen-welcome')">Назад</button>
    </div>
  </div>

  <!-- СПИННЕР -->
  <div id="spinner" style="display:none;position:fixed;inset:0;background:rgba(10,8,24,0.92);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
    <div style="width:52px;height:52px;border:3px solid rgba(255,215,0,0.15);border-top-color:#ffd700;border-radius:50%;animation:spin 0.9s linear infinite;"></div>
    <p style="color:rgba(255,255,255,0.6);font-family:sans-serif;font-size:1rem;">Рассчитываем карту...</p>
  </div>

  <!-- ЭКРАН 3: Результат -->
  <div id="screen-result">
    <div class="result-wrap">

      <div class="result-hero">
        <div class="result-name" id="res-name">Имя</div>
        <div class="result-type-badge" id="res-type">Тип</div>
      </div>

      <div class="cards-grid">
        <div class="info-card full-width">
          <div class="info-label">Стратегия</div>
          <div class="info-value" id="res-strategy"></div>
        </div>
        <div class="info-card full-width">
          <div class="info-label">Авторитет</div>
          <div class="info-value" id="res-authority"></div>
        </div>
        <div class="info-card full-width">
          <div class="info-label">Профиль</div>
          <div class="info-value" id="res-profile"></div>
        </div>
      </div>

      <div class="recommendations">
        <h3>Рекомендации</h3>
        <div id="rec-text"></div>
      </div>

      <div class="bodygraph-section">
        <div class="section-title">Карта Дизайна</div>
        <svg id="bodygraph-svg" viewBox="0 0 360 520" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;border-radius:0 0 16px 16px;"></svg>
      </div>

      <button class="btn-back" onclick="showScreen('screen-form')" style="margin-bottom:2rem;">← Новый расчёт</button>
    </div>
  </div>

  <!-- БАРАБАН: Дата -->
  <div id="picker-date" class="picker-overlay" onclick="closePicker('date')">
    <div class="picker-sheet" onclick="event.stopPropagation()">
      <div class="picker-header">
        <button class="btn-back" onclick="closePicker('date')">Отмена</button>
        <span class="picker-title">Дата рождения</span>
        <button class="picker-done" onclick="confirmDate()">Готово</button>
      </div>
      <div class="picker-body">
        <div class="picker-col" id="col-day"></div>
        <div class="picker-col" id="col-month"></div>
        <div class="picker-col" id="col-year"></div>
        <div class="picker-highlight"></div>
      </div>
    </div>
  </div>

  <!-- БАРАБАН: Время -->
  <div id="picker-time" class="picker-overlay" onclick="closePicker('time')">
    <div class="picker-sheet" onclick="event.stopPropagation()">
      <div class="picker-header">
        <button class="btn-back" onclick="closePicker('time')">Отмена</button>
        <span class="picker-title">Время рождения</span>
        <button class="picker-done" onclick="confirmTime()">Готово</button>
      </div>
      <div class="picker-body">
        <div class="picker-col" id="col-hour"></div>
        <div class="picker-col" id="col-minute"></div>
        <div class="picker-highlight"></div>
      </div>
    </div>
  </div>

  <script src="js/planets_table.js"></script>
  <script src="js/ephemeris.js"></script>
  <script src="js/bodygraph.js"></script>
  <script src="js/app.js"></script>
  <script src="js/picker.js"></script>
  <script src="js/cities.js"></script>
</body>
</html>
